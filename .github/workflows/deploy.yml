# Deploy em `main`: web (Vercel) e gancho opcional Railway.
# Configure os secrets no repositório / ambiente GitHub antes de ativar os passos.

name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Vercel (web)
    runs-on: ubuntu-latest
    if: >-
      secrets.VERCEL_TOKEN != '' &&
      (github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes

  deploy-railway:
    name: Railway (API / worker)
    runs-on: ubuntu-latest
    if: >-
      secrets.RAILWAY_TOKEN != '' &&
      (github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Redeploy (ajuste o serviço alvo na Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Defina aqui os comandos alvo (ex.: railway redeploy --service api)."
          echo "Recomendado: integração Git nativa da Railway em vez de CLI no CI."
          echo "Release de schema: no serviço API, executar prisma migrate deploy antes do processo HTTP (ver docs/staging.md)."

  deploy-web-staging:
    name: Vercel (web preview / staging)
    runs-on: ubuntu-latest
    if: >-
      secrets.VERCEL_TOKEN != '' &&
      (github.ref == 'refs/heads/develop' ||
        github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy preview to Vercel
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --token "$VERCEL_TOKEN" --yes

  deploy-railway-staging:
    name: Railway (staging)
    runs-on: ubuntu-latest
    if: >-
      secrets.RAILWAY_TOKEN != '' &&
      (github.ref == 'refs/heads/develop' ||
        github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Staging redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Configure: railway redeploy --service <api_staging> --environment staging"
          echo "Prefer Railway Git integration on branch develop — see docs/git-workflow.md"

  deploy-admin:
    name: Vercel (platform admin)
    runs-on: ubuntu-latest
    if: >-
      secrets.VERCEL_TOKEN != '' &&
      secrets.VERCEL_ADMIN_PROJECT_ID != '' &&
      (github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy admin to Vercel
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes

  deploy-admin-staging:
    name: Vercel (admin staging)
    runs-on: ubuntu-latest
    if: >-
      secrets.VERCEL_TOKEN != '' &&
      secrets.VERCEL_ADMIN_PROJECT_ID != '' &&
      (github.ref == 'refs/heads/develop' ||
        github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy admin preview to Vercel
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --token "$VERCEL_TOKEN" --yes
