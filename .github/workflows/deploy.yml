# Deploy em `main`: web (Vercel) e gancho opcional Railway.
# Configure VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (e VERCEL_ADMIN_PROJECT_ID) nos secrets do repositório.

name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Vercel (web)
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Require Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Configure repository secret VERCEL_TOKEN to enable deploy."
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm --filter @navomnis/web run build
      - name: Prepare Vercel prebuilt output
        working-directory: apps/web
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
      - name: Deploy to Vercel
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prod --prebuilt --token "$VERCEL_TOKEN" --yes

  deploy-railway:
    name: Railway (API / worker)
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Redeploy (ajuste o serviço alvo na Railway)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Defina aqui os comandos alvo (ex.: railway redeploy --service api)."
          echo "Recomendado: integração Git nativa da Railway em vez de CLI no CI."
          echo "Release de schema: no serviço API, executar prisma migrate deploy antes do processo HTTP (ver docs/staging.md)."

  deploy-web-staging:
    name: Vercel (web preview / staging)
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Require Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Configure repository secret VERCEL_TOKEN to enable deploy."
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING }}
        run: pnpm --filter @navomnis/web run build
      - name: Prepare Vercel prebuilt output
        working-directory: apps/web
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
      - name: Deploy preview to Vercel
        working-directory: apps/web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prebuilt --token "$VERCEL_TOKEN" --yes

  deploy-railway-staging:
    name: Railway (staging)
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Staging redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Configure: railway redeploy --service <api_staging> --environment staging"
          echo "Prefer Railway Git integration on branch develop — see docs/git-workflow.md"

  deploy-admin:
    name: Vercel (platform admin)
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Require Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ADMIN_PROJECT_ID }}" ]; then
            echo "::error::Configure VERCEL_TOKEN and VERCEL_ADMIN_PROJECT_ID."
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build admin
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm --filter @navomnis/admin run build
      - name: Prepare Vercel prebuilt output
        working-directory: apps/admin
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
      - name: Deploy admin to Vercel
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prod --prebuilt --token "$VERCEL_TOKEN" --yes

  deploy-admin-staging:
    name: Vercel (admin staging)
    runs-on: ubuntu-latest
    if: >-
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Require Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ADMIN_PROJECT_ID }}" ]; then
            echo "::error::Configure VERCEL_TOKEN and VERCEL_ADMIN_PROJECT_ID."
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build admin
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING }}
        run: pnpm --filter @navomnis/admin run build
      - name: Prepare Vercel prebuilt output
        working-directory: apps/admin
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json
      - name: Deploy admin preview to Vercel
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel deploy --prebuilt --token "$VERCEL_TOKEN" --yes
