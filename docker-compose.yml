services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: navomnis
      POSTGRES_PASSWORD: navomnis
      POSTGRES_DB: navomnis
    ports:
      - "5432:5432"
    volumes:
      - navomnis_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navomnis -d navomnis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  navomnis_pg:
